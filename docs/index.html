<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acción Cultural Torrero</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

* {margin:0; padding:0; box-sizing:border-box;}

body {
  font-family: 'Poppins', sans-serif;
  background:#f5f5f5;
  color:#333;
}

/* NAV */
nav {
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.85);
  padding:15px;
  text-align:center;
  z-index:1000;
}

nav a {
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:600;
}

/* MENU ICONO */
.menu-icon {
  display:none;
}

/* HEADER */
header {
  height:70vh;
  background-image:url("collage.jpg");
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding-top:60px;
}

header h1 {
  color:#007BFF;
  font-size:3rem;
}

header p {
  font-size:1.2rem;
}

/* BOTÓN */
.btn-main {
  margin-top:20px;
  padding:12px 25px;
  background:#b22222;
  color:white;
  border-radius:30px;
  text-decoration:none;
}

/* SECCIONES */
section {
  padding:80px 20px;
  max-width:1100px;
  margin:auto;
}

.card {
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
}

.grid img {
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
}

/* 📱 MÓVIL */
@media (max-width:768px){

  .menu-icon {
    display:block;
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    color:white;
  }

  nav a {
    display:none;
  }

  nav.active a {
    display:block;
    background:#000;
    padding:15px;
  }

  header {
    height:auto;
    padding:100px 20px;
  }

  header h1 {
    font-size:2rem;
  }

}

</style>
</head>

<body>

<nav>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <a href="#">Inicio</a>
  <a href="#">Nosotros</a>
  <a href="#">Actividades</a>
  <section id="cabezudos">
  <div class="card">
    <h2>🎭 Comparsa de Cabezudos Torrero</h2>

    <div class="grid">
      <div><img src="cabezudo1.jpg"><p>El Baturro</p></div>
      <div><img src="cabezudo2.jpg"><p>El Verrugón</p></div>
      <div><img src="cabezudo3.jpg"><p>El Payaso</p></div>
      <div><img src="cabezudo4.jpg"><p>La Forana</p></div>
      <div><img src="cabezudo5.jpg"><p>Morico</p></div>
      <div><img src="cabezudo6.jpg"><p>Militar</p></div>
      <div><img src="cabezudo7.jpg"><p>Pirata</p></div>
      <div><img src="cabezudo8.jpg"><p>Bombero</p></div>
    </div>

  </div>
</section>
  <a href="#">Eventos</a>
  <a href="#">Galería</a>
  <a href="#">Contacto</a>
</nav>

<header>
  <h1>Acción Cultural Torrero</h1>
  <p>Cultura, tradición y vida en el barrio</p>
  <a href="#" class="btn-main">Ver Galería</a>
</header>

<section>
  <div class="card">
    <h2>Contenido</h2>
    <p>Tu web ya funciona correctamente 🚀</p>
  </div>
</section>

<script>
function toggleMenu() {
  document.querySelector("nav").classList.toggle("active");
}
</script>

</body>
</html>
